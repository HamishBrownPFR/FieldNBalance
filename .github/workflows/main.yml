name: Main
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [ opened, synchronize, reopened ]
  release:
    types: [ published ]

env:
  IS_MAIN: ${{ github.ref_name == 'main' }}

jobs:
  unit-tests:
    name: Run Unit Tests
    uses: ./.github/workflows/unit-tests.yml
    secrets: inherit

  validation-tests:
    name: Run Validation Tests
    if: ${{ env.IS_MAIN && github.event_name != 'pull_request' }}
    uses: ./.github/workflows/validation-tests.yml
    secrets: inherit

  publish-nuget:
    name: Publish Nuget
    needs: [ unit-tests ]
    if: ${{ env.IS_MAIN && github.event_name != 'pull_request' }}
    uses: ./.github/workflows/publish-svs.yml
    secrets: inherit
    with:
      beta: false

  publish-nuget-beta:
    name: Publish Nuget Beta
    needs: [ unit-tests ]
    if: ${{ !env.IS_MAIN }}
    uses: ./.github/workflows/publish-svs.yml
    secrets: inherit
    with:
      beta: true
