name: Main
on:
  workflow_dispatch:
    inputs:
      targetBranch:
        description: "Branch to target"
        required: true
        default: "develop"
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [ opened, synchronize, reopened ]
  release:
    types: [ published ]
jobs:
  unit-tests:
    name: Run Unit Tests
    uses: ./.github/workflows/unit-tests.yml
    secrets: inherit

  validation-tests:
    name: Run Validation Tests
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.targetBranch == 'main') ||
      (github.event_name != 'workflow_dispatch' && github.event_name != 'pull_request' && github.ref_name == 'main')
    uses: ./.github/workflows/validation-tests.yml
    secrets: inherit

  publish-nuget:
    name: Publish Nuget
    needs: [ unit-tests ]
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.targetBranch == 'main') ||
      (github.event_name != 'workflow_dispatch' && github.event_name != 'pull_request' && github.ref_name == 'main')
    uses: ./.github/workflows/publish-svs.yml
    secrets: inherit
    with:
      beta: false

  publish-nuget-beta:
    name: Publish Nuget Beta
    needs: [ unit-tests ]
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.targetBranch != 'main') ||
      (github.event_name != 'workflow_dispatch' && github.ref_name != 'main')
    uses: ./.github/workflows/publish-svs.yml
    secrets: inherit
    with:
      beta: true
