name: Main
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened]
  release:
    types: [published]
jobs:
  unit-tests:
    name: Run Unit Tests
    uses: ./.github/workflows/unit-tests.yml
    secrets: inherit
  
  validation-tests:
    name: Run Validation Tests
    uses: ./.github/workflows/validation-tests.yml
    secrets: inherit
  
  publish-nuget:
    name: Publish Nuget
    needs: [unit-tests, validation-tests]
    uses: ./.github/workflows/publish-svs.yml
    secrets: inherit
  