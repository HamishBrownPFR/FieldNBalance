name: Unit Tests

on:
  workflow_call:

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  run-unit-tests:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      - name: .NET Build
        run: dotnet build

      - name: .NET Test
        run: |
          dotnet test --test-adapter-path:. --logger:"junit;LogFilePath=unit_results.xml"
